<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart Witnessing Availability</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        body { margin: 0; padding: 0; background-color: #0f172a; overflow-x: hidden; }
        
        /* Custom Progress Bar Animation for Database Loading */
        @keyframes indeterminate {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(200%); }
        }
        .progress-bar-inner {
            width: 50%;
            animation: indeterminate 1.5s infinite ease-in-out;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="env,react">
        const { useState, useEffect } = React;

        // =======================================================================
        // ⚠️ PASTE YOUR GOOGLE SCRIPT WEB APP URL BELOW:
        // Make sure it is wrapped in exactly two quotation marks "..."
        // =======================================================================
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzvBW91Ij4cXpanMbobZA82o0UaKWNQKwRi_D7UrcP4Zj7gtMdGIBhUVM3-5IbFsEbHpA/exec"; 
        
        // --- Icons ---
        const IconMapPin = ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
        const IconLogOut = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>;
        const IconUser = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const IconPlus = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
        const IconCheck = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;
        const IconX = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
        const IconEdit2 = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>;
        const IconTrash2 = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;
        const IconLock = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
        const IconUnlock = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>;
        const IconRotateCcw = ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>;
        const IconExternalLink = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>;
        const IconPhone = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>;
        const IconHeadset = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg>;
        const IconSettings = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;

        // Helper: Safely Format WhatsApp Numbers
        const formatWA = (phone) => {
            if (!phone) return "";
            return String(phone).replace(/[^0-9]/g, '');
        };

        // Helper: Safely get Admin Phone from LocalStorage
        const getSavedAdminPhone = () => {
            try { return localStorage.getItem('adminPhone') || '919876543210'; } 
            catch (e) { return '919876543210'; }
        };

        const saveAdminPhone = (val) => {
            try { localStorage.setItem('adminPhone', val); } catch (e) {}
        };

        function App() {
          const [isAdmin, setIsAdmin] = useState(false);
          const [showLogin, setShowLogin] = useState(false);
          const [passwordInput, setPasswordInput] = useState('');
          const [loginError, setLoginError] = useState('');

          const [locations, setLocations] = useState([]);
          const [isLoading, setIsLoading] = useState(true);

          // Admin Settings
          const [adminPhone, setAdminPhone] = useState(getSavedAdminPhone());
          const handleSaveAdminPhone = (e) => {
              setAdminPhone(e.target.value);
              saveAdminPhone(e.target.value);
          };

          // New Location Form States
          const [newLocName, setNewLocName] = useState('');
          const [newLocLink, setNewLocLink] = useState('');
          const [newLocPlusCode, setNewLocPlusCode] = useState('');
          const [newLocDesc, setNewLocDesc] = useState('');
          const [newLocContactName, setNewLocContactName] = useState('');
          const [newLocContactPhone, setNewLocContactPhone] = useState('');
          const [newLocMaxVols, setNewLocMaxVols] = useState(4);

          // 1. Fetch initial data from Google Sheets
          const fetchLocations = async () => {
            if (SCRIPT_URL === "PASTE_YOUR_COPIED_URL_HERE" || !SCRIPT_URL.startsWith("http")) {
              setIsLoading(false);
              return; 
            }
            try {
              const res = await fetch(SCRIPT_URL);
              const data = await res.json();
              setLocations(data);
              setIsLoading(false);
            } catch (err) {
              console.error("Failed to fetch data:", err);
              setIsLoading(false);
            }
          };

          // Fetch on load, and check for updates every 10 seconds
          useEffect(() => {
            fetchLocations();
            const interval = setInterval(fetchLocations, 10000);
            return () => clearInterval(interval);
          }, []);

          // Helper to send updates to Google Sheets
          const updateSheet = (action, payload) => {
             if(!SCRIPT_URL.startsWith("http")) return;
             fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' }, 
                body: JSON.stringify({ action, payload })
             }).catch(console.error);
          };

          const handleLogin = (e) => {
            e.preventDefault();
            if (passwordInput === 'Devanahalli_Cart1914') {
              setIsAdmin(true); setShowLogin(false); setPasswordInput(''); setLoginError('');
            } else { setLoginError('Incorrect password'); }
          };

          const addLocation = (e) => {
            e.preventDefault();
            if (!newLocName || !newLocLink || !newLocPlusCode) return;
            
            const newLoc = {
              id: Date.now(), 
              name: newLocName, 
              link: newLocLink, 
              plusCode: newLocPlusCode, 
              description: newLocDesc,
              contactName: newLocContactName,
              contactPhone: newLocContactPhone,
              maxVolunteers: parseInt(newLocMaxVols, 10) || 4, 
              volunteers: [], 
              locked: false
            };
            
            setLocations([...locations, newLoc]);
            updateSheet('ADD_LOCATION', newLoc);
            
            setNewLocName(''); setNewLocLink(''); setNewLocPlusCode(''); setNewLocDesc('');
            setNewLocContactName(''); setNewLocContactPhone(''); setNewLocMaxVols(4);
          };

          const updateLocationField = (locId, updates) => {
              setLocations(locations.map(l => l.id === locId ? { ...l, ...updates } : l));
              updateSheet('UPDATE_LOCATION', { id: locId, ...updates });
          };

          const clearVolunteers = (locId) => updateLocationField(locId, { volunteers: [], locked: false });
          const toggleLock = (locId) => {
              const loc = locations.find(l => l.id === locId);
              if (loc) updateLocationField(locId, { locked: !loc.locked });
          };

          const deleteLocation = (locId) => {
              setLocations(locations.filter(l => l.id !== locId));
              updateSheet('DELETE_LOCATION', { id: locId });
          };

          const deleteVolunteer = (locId, index) => {
              const loc = locations.find(l => l.id === locId);
              if (!loc) return;
              const newVols = [...loc.volunteers];
              newVols.splice(index, 1);
              updateLocationField(locId, { volunteers: newVols, locked: false });
          };

          const addVolunteer = (locId, name) => {
            if (!name.trim()) return;
            const loc = locations.find(l => l.id === locId);
            const totalCapacity = (parseInt(loc.maxVolunteers, 10) || 4) + 1; 
            
            if (!loc || loc.locked || loc.volunteers.length >= totalCapacity) return;
            
            const newVols = [...loc.volunteers, name.trim()];
            const isNowLocked = newVols.length >= totalCapacity;
            updateLocationField(locId, { volunteers: newVols, locked: isNowLocked });
          };

          return (
            <div className="min-h-screen bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-800 via-[#0a0f1c] to-black text-slate-200 font-sans selection:bg-blue-500/30 pb-20">
              <header className="p-6 md:px-12 flex justify-between items-center border-b border-white/5 backdrop-blur-sm sticky top-0 z-20 bg-slate-900/60">
                <h1 className="text-xl md:text-2xl font-light tracking-wide text-white">
                  Cart Witnessing <span className="font-semibold text-blue-400">Availability</span>
                </h1>
                <div className="flex items-center gap-3">
                  <a href={`https://wa.me/${formatWA(adminPhone)}`} target="_blank" rel="noopener noreferrer" className="flex items-center gap-2 text-sm text-green-400 hover:text-green-300 transition-colors bg-green-500/10 px-4 py-2 rounded-full border border-green-500/20 shadow-lg shadow-green-500/5">
                    <IconHeadset size={16} /> <span className="hidden md:inline">Contact Admin</span>
                  </a>
                  {isAdmin ? (
                    <button onClick={() => setIsAdmin(false)} title="Admin Logout" className="flex items-center justify-center text-slate-400 hover:text-red-400 transition-colors bg-white/5 h-10 w-10 rounded-full border border-white/10 hover:border-red-500/30">
                      <IconLogOut size={18} />
                    </button>
                  ) : (
                    <button onClick={() => setShowLogin(true)} title="Admin Login" className="flex items-center justify-center text-slate-400 hover:text-white transition-colors bg-white/5 h-10 w-10 rounded-full border border-white/10 hover:bg-white/10">
                      <IconUser size={18} />
                    </button>
                  )}
                </div>
              </header>

              <main className="max-w-6xl mx-auto p-6 md:p-12 space-y-8">
                {(!SCRIPT_URL.startsWith("http")) && (
                    <div className="bg-orange-500/10 border border-orange-500/30 text-orange-400 p-4 rounded-xl text-center shadow-lg">
                        ⚠️ <b>Setup Incomplete:</b> You need to paste your Google Apps Script URL into the HTML code where it says <code>SCRIPT_URL</code>. Make sure it is wrapped in quotes!
                    </div>
                )}

                {isAdmin && (
                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-12">
                    <div className="bg-[#1e293b]/60 border border-purple-500/20 p-6 rounded-2xl backdrop-blur-md shadow-2xl flex flex-col justify-between">
                      <div>
                        <h2 className="text-lg font-medium text-purple-300 mb-4 flex items-center gap-2">
                          <IconSettings size={18} /> Global Settings
                        </h2>
                        <p className="text-sm text-slate-400 mb-4">Update the default WhatsApp number used for the "Contact Admin" button.</p>
                        <div className="space-y-2">
                            <label className="text-xs text-slate-500 uppercase tracking-wider font-semibold">Admin WhatsApp Number</label>
                            <input type="tel" value={adminPhone} onChange={handleSaveAdminPhone} className="w-full bg-black/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-purple-500 transition-colors" placeholder="e.g. 919876543210" />
                        </div>
                      </div>
                    </div>

                    <div className="lg:col-span-2 bg-[#1e293b]/40 border border-blue-500/20 p-6 rounded-2xl backdrop-blur-md shadow-2xl">
                      <h2 className="text-lg font-medium text-blue-300 mb-4 flex items-center gap-2">
                        <IconMapPin size={18} /> Add New Location
                      </h2>
                      <form onSubmit={addLocation} className="flex flex-col gap-4">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                          <input type="text" placeholder="Location Name" value={newLocName} onChange={(e) => setNewLocName(e.target.value)} className="bg-black/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 transition-colors" required />
                          <input type="url" placeholder="Google Maps Link" value={newLocLink} onChange={(e) => setNewLocLink(e.target.value)} className="bg-black/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 transition-colors" required />
                          <input type="text" placeholder="Contact Person Name" value={newLocContactName} onChange={(e) => setNewLocContactName(e.target.value)} className="bg-black/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 transition-colors" required />
                          <input type="tel" placeholder="WhatsApp Number (e.g. 919876543210)" value={newLocContactPhone} onChange={(e) => setNewLocContactPhone(e.target.value)} className="bg-black/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 transition-colors" required />
                          
                          <div className="bg-black/50 border border-slate-700 rounded-xl px-4 py-2 flex items-center justify-between">
                            <span className="text-sm text-slate-400">Base Volunteer Slots <br/><span className="text-xs text-slate-600">(+1 Backup auto-added)</span></span>
                            <input type="number" min="1" max="10" value={newLocMaxVols} onChange={(e) => setNewLocMaxVols(e.target.value)} className="bg-transparent text-white text-xl text-right focus:outline-none w-16" required />
                          </div>

                          <input type="text" placeholder="Plus Code / Search (e.g. 6PHF+V5...)" value={newLocPlusCode} onChange={(e) => setNewLocPlusCode(e.target.value)} className="bg-black/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 transition-colors" required />
                          <input type="text" placeholder="Description / Instructions (Optional)" value={newLocDesc} onChange={(e) => setNewLocDesc(e.target.value)} className="bg-black/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 transition-colors md:col-span-2" />
                        </div>
                        <button type="submit" className="w-full md:w-auto self-end bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-xl font-medium transition-colors shadow-lg shadow-blue-900/20 flex items-center justify-center gap-2 mt-2">
                          <IconPlus size={18} /> Add Location
                        </button>
                      </form>
                    </div>
                  </div>
                )}

                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                  {isLoading ? (
                      <div className="col-span-full flex flex-col items-center justify-center py-32 space-y-6">
                          <div className="relative">
                              <IconMapPin size={48} className="text-blue-500 animate-bounce relative z-10" />
                              <div className="absolute -bottom-1 left-1/2 -translate-x-1/2 w-8 h-2 bg-blue-500/40 rounded-[100%] blur-[3px] animate-pulse"></div>
                          </div>
                          <div className="w-64 max-w-full text-center">
                              <div className="h-1.5 w-full bg-slate-800 rounded-full overflow-hidden shadow-inner shadow-black">
                                  <div className="h-full bg-blue-500 rounded-full progress-bar-inner shadow-[0_0_10px_rgba(59,130,246,0.5)]"></div>
                              </div>
                              <p className="text-slate-400 font-light tracking-wide mt-4 animate-pulse text-sm">Connecting to Database...</p>
                          </div>
                      </div>
                  ) : locations.length === 0 ? (
                      <div className="col-span-full text-center py-20 text-slate-500 font-light">No locations added yet. Log in to add one!</div>
                  ) : (
                      locations.map(loc => (
                        <LocationCard 
                          key={loc.id} location={loc} isAdmin={isAdmin}
                          addVolunteer={addVolunteer} deleteVolunteer={deleteVolunteer}
                          clearVolunteers={clearVolunteers} toggleLock={toggleLock} 
                          updateLocationField={updateLocationField} deleteLocation={deleteLocation}
                        />
                      ))
                  )}
                </div>
              </main>

              {showLogin && (
                <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                  <div className="bg-[#111827] border border-slate-800 rounded-2xl p-8 w-full max-w-md shadow-2xl relative">
                    <button onClick={() => setShowLogin(false)} className="absolute top-4 right-4 text-slate-500 hover:text-white"><IconX size={20} /></button>
                    <h2 className="text-2xl font-light mb-6 text-white text-center">Admin Access</h2>
                    <form onSubmit={handleLogin} className="space-y-4">
                      <input type="password" placeholder="Enter Password" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} className="w-full bg-black/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 transition-colors text-center text-lg tracking-widest" autoFocus />
                      {loginError && <p className="text-red-400 text-sm text-center">{loginError}</p>}
                      <button type="submit" className="w-full bg-slate-100 hover:bg-white text-slate-900 px-6 py-3 rounded-xl font-medium transition-colors">Unlock Privileges</button>
                    </form>
                  </div>
                </div>
              )}
            </div>
          );
        }

        function LocationCard({ location, isAdmin, addVolunteer, deleteVolunteer, clearVolunteers, toggleLock, updateLocationField, deleteLocation }) {
          const [isEditingName, setIsEditingName] = useState(false);
          const [tempName, setTempName] = useState(location.name);

          const saveName = () => {
            if (tempName.trim()) updateLocationField(location.id, { name: tempName });
            setIsEditingName(false);
          };

          const maxVols = parseInt(location.maxVolunteers, 10) || 4;
          const totalSlots = maxVols + 1;
          const slotsArray = Array.from({ length: totalSlots }, (_, i) => i);

          const adjustCapacity = (delta) => {
             const newCapacity = Math.max(1, maxVols + delta);
             updateLocationField(location.id, { maxVolunteers: newCapacity });
          };

          return (
            <div className={`bg-[#1e293b]/40 border ${location.locked ? 'border-red-500/20' : 'border-slate-800'} rounded-3xl overflow-hidden backdrop-blur-md flex flex-col shadow-xl transition-all duration-300`}>
              <div className="p-6 border-b border-white/5 flex justify-between items-start bg-black/20 relative">
                
                {isAdmin && (
                    <button onClick={() => deleteLocation(location.id)} className="absolute top-6 right-6 text-slate-600 hover:text-red-500 transition-colors" title="Delete Entire Location">
                        <IconTrash2 size={18} />
                    </button>
                )}

                <div className="flex-1 pr-8">
                  {isEditingName ? (
                    <div className="flex items-center gap-2">
                      <input type="text" value={tempName} onChange={(e) => setTempName(e.target.value)} className="bg-black/50 border border-blue-500 rounded-lg px-3 py-1 text-white focus:outline-none w-full" autoFocus onKeyDown={(e) => e.key === 'Enter' && saveName()} />
                      <button onClick={saveName} className="text-green-400 hover:text-green-300 p-1"><IconCheck size={18} /></button>
                    </div>
                  ) : (
                    <h3 className="text-xl font-semibold text-white flex items-center gap-3">
                      {location.name}
                      {isAdmin && <button onClick={() => setIsEditingName(true)} className="text-slate-500 hover:text-blue-400 transition-colors"><IconEdit2 size={16} /></button>}
                    </h3>
                  )}
                  {location.description && <p className="text-sm text-slate-300 mt-2 mb-1 leading-relaxed bg-black/20 p-2 rounded-lg border border-white/5">{location.description}</p>}
                  
                  <div className="flex flex-wrap items-center gap-3 mt-3">
                      <a href={location.link} target="_blank" rel="noopener noreferrer" className="text-sm text-slate-400 flex items-center gap-1 hover:text-blue-400 transition-colors w-fit bg-white/5 px-3 py-1.5 rounded-lg border border-white/10">
                        <IconMapPin size={14} /> Maps <IconExternalLink size={12} />
                      </a>
                      
                      {location.contactPhone && (
                        <a href={`https://wa.me/${formatWA(location.contactPhone)}`} target="_blank" rel="noopener noreferrer" className="text-sm text-green-400 flex items-center gap-1.5 hover:text-green-300 transition-colors w-fit bg-green-500/10 px-3 py-1.5 rounded-lg border border-green-500/20">
                          <IconPhone size={14} /> {location.contactName ? `Contact ${location.contactName}` : 'Contact'}
                        </a>
                      )}

                      {location.locked ? (
                        <span className="flex items-center gap-1 text-xs font-medium bg-red-500/10 text-red-400 px-3 py-1.5 rounded-full border border-red-500/20"><IconLock size={12} /> Locked</span>
                      ) : (
                        <span className="flex items-center gap-1 text-xs font-medium bg-emerald-500/10 text-emerald-400 px-3 py-1.5 rounded-full border border-emerald-500/20"><IconUnlock size={12} /> Open</span>
                      )}
                  </div>
                </div>
              </div>

              <div className="p-6 flex-1 space-y-3">
                <div className="flex justify-between items-end mb-4">
                  <h4 className="text-xs uppercase tracking-wider text-slate-500 font-semibold">Volunteers ({location.volunteers?.length || 0}/{totalSlots})</h4>
                  
                  {isAdmin && (
                    <div className="flex items-center gap-2 bg-black/30 border border-white/5 rounded-lg p-1">
                       <span className="text-[10px] text-slate-500 uppercase px-2">Capacity</span>
                       <button onClick={() => adjustCapacity(-1)} className="w-6 h-6 flex items-center justify-center rounded text-slate-400 hover:text-white hover:bg-white/10 transition-colors">-</button>
                       <span className="text-xs font-bold text-white w-4 text-center">{maxVols}</span>
                       <button onClick={() => adjustCapacity(1)} className="w-6 h-6 flex items-center justify-center rounded text-slate-400 hover:text-white hover:bg-white/10 transition-colors">+</button>
                    </div>
                  )}
                </div>

                {slotsArray.map((slotIndex) => {
                  const volunteerName = location.volunteers ? location.volunteers[slotIndex] : undefined;
                  const isBackup = slotIndex === totalSlots - 1; 
                  
                  return (
                    <div key={slotIndex} className="flex items-center gap-3">
                      <div className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold ${volunteerName ? 'bg-blue-500/20 text-blue-400 border border-blue-500/30' : 'bg-slate-800 text-slate-600'}`}>
                        {isBackup ? 'B' : slotIndex + 1}
                      </div>
                      <div className="flex-1">
                        {volunteerName ? (
                          <div className="flex items-center justify-between bg-white/5 rounded-xl px-4 py-2.5 border border-white/5">
                            <span className="text-slate-200">{volunteerName} {isBackup && <span className="ml-2 text-xs text-orange-400 bg-orange-400/10 px-2 py-0.5 rounded uppercase tracking-wider">(Backup)</span>}</span>
                            {isAdmin && <button onClick={() => deleteVolunteer(location.id, slotIndex)} className="text-slate-500 hover:text-red-400 transition-colors" title="Remove Volunteer"><IconTrash2 size={16} /></button>}
                          </div>
                        ) : (
                          <VolunteerInput disabled={location.locked} isBackup={isBackup} onAdd={(name) => addVolunteer(location.id, name)} />
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>

              {isAdmin && (
                <div className="px-6 py-4 bg-slate-900/50 border-t border-white/5 flex justify-between items-center">
                  <button onClick={() => clearVolunteers(location.id)} className="flex items-center gap-2 text-sm px-4 py-2 rounded-lg font-medium text-slate-400 hover:text-white hover:bg-white/5 transition-colors border border-transparent hover:border-white/10">
                    <IconRotateCcw size={16}/> Clear Names
                  </button>
                  <button onClick={() => toggleLock(location.id)} className={`flex items-center gap-2 text-sm px-4 py-2 rounded-lg font-medium transition-colors ${location.locked ? 'bg-slate-800 text-slate-300 hover:bg-slate-700 border border-slate-700' : 'bg-red-500/10 text-red-400 hover:bg-red-500/20 border border-red-500/20'}`}>
                    {location.locked ? <><IconUnlock size={16}/> Unlock Location</> : <><IconLock size={16}/> Force Lock</>}
                  </button>
                </div>
              )}

              <div className="h-48 w-full bg-slate-900 border-t border-slate-800 relative group">
                <iframe title={`Map for ${location.name}`} width="100%" height="100%" style={{ border: 0, filter: 'invert(90%) hue-rotate(180deg) opacity(0.8)' }} src={`https://maps.google.com/maps?q=${encodeURIComponent(location.plusCode || location.name)}&z=14&output=embed`} allowFullScreen></iframe>
                <div className="absolute inset-0 bg-blue-900/10 pointer-events-none group-hover:bg-transparent transition-colors"></div>
              </div>
            </div>
          );
        }

        function VolunteerInput({ disabled, isBackup, onAdd }) {
          const [name, setName] = useState('');
          const handleSubmit = (e) => { e.preventDefault(); onAdd(name); setName(''); };

          if (disabled) return (
            <div className="bg-black/20 rounded-xl px-4 py-2.5 border border-dashed border-slate-700 flex items-center justify-between opacity-50">
              <span className="text-slate-600 italic">Locked</span>
              {isBackup && <span className="text-xs text-slate-600 px-2 py-0.5 uppercase tracking-wider">(Backup Slot)</span>}
            </div>
          );

          return (
            <form onSubmit={handleSubmit} className="flex items-center gap-2 w-full relative">
              <div className="relative flex-1">
                <input type="text" placeholder={isBackup ? "Enter backup name..." : "Enter name..."} value={name} onChange={(e) => setName(e.target.value)} className="w-full bg-black/40 border border-slate-700 rounded-xl px-4 py-2.5 text-slate-200 placeholder-slate-600 focus:outline-none focus:border-blue-500 transition-colors pr-24" />
                {isBackup && <span className="absolute right-3 top-1/2 -translate-y-1/2 text-[10px] text-orange-500/70 uppercase tracking-widest pointer-events-none">Backup</span>}
              </div>
              <button type="submit" disabled={!name.trim()} className="bg-blue-600/20 hover:bg-blue-600/40 text-blue-400 border border-blue-500/30 px-4 py-2.5 rounded-xl font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed">Join</button>
            </form>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
